<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}CrimeGuard AI{% endblock %}</title>
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon1.ico') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_css %}{% endblock %}
</head>
<body>

<header class="site-header">
  <div class="wrap inner">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-badge">
        <span class="ring"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>
      </span>
      <span>CRIME<span class="accent">GUARD</span><span class="dim"> AI</span></span>
    </a>
    <nav class="nav">
      <a href="{{ url_for('home') }}" class="{{ 'active' if active=='home' else '' }}">Home</a>
      <a href="{{ url_for('history') }}" class="{{ 'active' if active=='history' else '' }}">History</a>
      <a href="{{ url_for('about') }}" class="{{ 'active' if active=='about' else '' }}">About</a>
    </nav>
    <div class="status-pill"><span class="dot"></span>Model Online</div>
  </div>
</header>

{% block content %}{% endblock %}

<footer class="site-footer">© 2026 CrimeGuard AI &middot; AI-Powered Crime Resolution Prediction &middot; Secure </footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
